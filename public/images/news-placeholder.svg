<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Desert Rose Gives placeholder graphic for an upcoming post">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0A0F"/>
      <stop offset="55%" stop-color="#1E3A8A"/>
      <stop offset="100%" stop-color="#0A0A0F"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7DD3FC" stop-opacity="0"/>
      <stop offset="50%" stop-color="#7DD3FC" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7DD3FC" stop-opacity="0"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#7DD3FC" fill-opacity="0.14"/>
    </pattern>
  </defs>
  <rect width="1200" height="750" fill="url(#bg)"/>
  <rect width="1200" height="750" fill="url(#dots)"/>
  <g opacity="0.5">
    <path d="M 0 500 Q 300 420 600 500 T 1200 500" stroke="url(#accent)" stroke-width="2" fill="none"/>
    <path d="M 0 540 Q 300 460 600 540 T 1200 540" stroke="url(#accent)" stroke-width="1.5" fill="none" opacity="0.7"/>
    <path d="M 0 580 Q 300 500 600 580 T 1200 580" stroke="url(#accent)" stroke-width="1" fill="none" opacity="0.4"/>
  </g>
  <g transform="translate(600 355)">
    <circle r="68" fill="none" stroke="#7DD3FC" stroke-width="1.25" opacity="0.7"/>
    <circle r="110" fill="none" stroke="#7DD3FC" stroke-width="1" opacity="0.45"/>
    <circle r="155" fill="none" stroke="#7DD3FC" stroke-width="0.75" opacity="0.25"/>
  </g>
  <g transform="translate(600 540)" text-anchor="middle">
    <text font-family="Georgia, 'Times New Roman', serif" font-size="26" fill="#FAF8F5" letter-spacing="8">DESERT ROSE</text>
    <text y="32" font-family="Georgia, 'Times New Roman', serif" font-size="20" font-style="italic" fill="#7DD3FC" letter-spacing="4">gives</text>
  </g>
